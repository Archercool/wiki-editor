<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub 授权 - 知识库</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      background: white;
      border-radius: 8px;
      padding: 40px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      background: #28a745;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .icon svg {
      width: 32px;
      height: 32px;
      fill: white;
    }
    h1 {
      font-size: 24px;
      color: #333;
      margin-bottom: 16px;
    }
    p {
      color: #666;
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .steps {
      text-align: left;
      background: #f8f9fa;
      border-radius: 8px;
      padding: 20px;
      margin: 24px 0;
    }
    .steps h3 {
      font-size: 14px;
      color: #333;
      margin-bottom: 12px;
    }
    .steps ol {
      padding-left: 20px;
      color: #666;
      font-size: 14px;
    }
    .steps li {
      margin-bottom: 8px;
    }
    .btn {
      display: inline-block;
      background: #0366d6;
      color: white;
      padding: 12px 24px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 16px;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #0256b9;
    }
    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
      </svg>
    </div>
    
    <h1>GitHub 授权</h1>
    <p>知识库需要访问你的 GitHub 仓库来保存编辑内容</p>
    
    <div class="steps">
      <h3>操作步骤：</h3>
      <ol>
        <li>回到知识库编辑页面</li>
        <li>点击"使用 GitHub 账号登录"</li>
        <li>在弹窗中点击授权链接</li>
        <li>在 GitHub 页面输入验证码</li>
        <li>授权完成后回到编辑页面</li>
      </ol>
    </div>
    
    <a href="edit.html" class="btn">返回编辑器</a>
    
    <div class="footer">
      <p>如果你已经完成授权，请返回编辑器页面</p>
    </div>
  </div>
</body>
</html>
