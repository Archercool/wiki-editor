<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识库编辑器</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;height:100vh;display:flex;flex-direction:column;background:#263238}
/* 顶部 */
.bar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:#1a1a2e;border-bottom:1px solid #333;flex-shrink:0}
.bar .logo{font-weight:700;font-size:14px;color:#e0e0e0;text-decoration:none;white-space:nowrap}
.bar input{flex:1;min-width:120px;padding:6px 8px;border:1px solid #444;border-radius:3px;font:13px monospace;background:#2d2d44;color:#e0e0e0}
.bar input:focus{outline:none;border-color:#569cd6}
.bar button{padding:6px 12px;border:none;border-radius:3px;cursor:pointer;font-size:12px;white-space:nowrap}
.btn-save{background:#0e639c;color:#fff}
.btn-save:hover{background:#1177bb}
.btn-out{background:#333;color:#ccc;border:1px solid #444!important}
.btn-out:hover{background:#444}
#status{font-size:11px;color:#888;min-width:50px}
/* 编辑区 */
.main{flex:1;display:flex;overflow:hidden}
.editor-pane{flex:1;overflow:hidden;border-right:1px solid #333;display:flex;flex-direction:column}
.editor-pane .CodeMirror{flex:1;font-size:14px}
.preview-pane{flex:1;overflow-y:auto;padding:20px;background:#1e1e2e;color:#d4d4d4;display:none}
.preview-pane h1,.preview-pane h2,.preview-pane h3{color:#fff;margin:16px 0 8px}
.preview-pane p{line-height:1.7;margin:8px 0}
.preview-pane code{background:#2d2d44;padding:2px 6px;border-radius:3px;font-size:13px;color:#ce9178}
.preview-pane pre{background:#1a1a2e;padding:12px;border-radius:4px;overflow-x:auto}
.preview-pane pre code{background:none;padding:0}
.preview-pane ul,.preview-pane ol{padding-left:24px}
.preview-pane li{margin:4px 0}
.preview-pane a{color:#569cd6}
.preview-pane blockquote{border-left:3px solid #444;padding:4px 12px;color:#999;margin:8px 0}
.preview-pane table{border-collapse:collapse;width:100%}
.preview-pane th,.preview-pane td{border:1px solid #444;padding:6px 10px;text-align:left}
.preview-pane th{background:#2d2d44}
.preview-pane hr{border:none;border-top:1px solid #333;margin:16px 0}
.editor-label{font-size:11px;color:#888;padding:4px 12px;background:#1a1a2e;border-bottom:1px solid #333;text-transform:uppercase;letter-spacing:1px}
/* 登录 */
.login-page{display:flex;align-items:center;justify-content:center;height:100vh;background:#1a1a2e}
.login-box{background:#263238;padding:36px;border-radius:8px;box-shadow:0 2px 20px rgba(0,0,0,.3);width:380px;max-width:90%;text-align:center}
.login-box h2{margin-bottom:6px;color:#e0e0e0}
.login-box p{color:#888;margin-bottom:18px;font-size:14px}
.gh-btn{display:inline-flex;align-items:center;gap:8px;width:100%;padding:11px;background:#24292e;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer;margin-bottom:14px;justify-content:center}
.gh-btn:hover{background:#2f363d}
.diver{display:flex;align-items:center;gap:10px;margin:14px 0;color:#555;font-size:12px}
.diver::before,.diver::after{content:'';flex:1;border-bottom:1px solid #333}
.login-box input[type=password]{width:100%;padding:8px;border:1px solid #444;border-radius:3px;font-size:13px;background:#1a1a2e;color:#e0e0e0}
.tk-btn{width:100%;margin-top:8px;padding:8px;background:#0e639c;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:13px}
.hint{font-size:12px;color:#666;margin-top:8px}
.hint a{color:#569cd6}
/* 文件弹窗 */
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center}
.modal-box{background:#263238;border-radius:8px;width:560px;max-width:90%;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 4px 24px rgba(0,0,0,.4)}
.modal-h{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid #333}
.modal-h h3{font-size:15px;color:#e0e0e0}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#666}
.modal-body{flex:1;overflow-y:auto;padding:10px}
.modal-foot{padding:10px 18px;border-top:1px solid #333}
.modal-foot input{width:100%;padding:8px;border:1px solid #444;border-radius:3px;font-size:13px;background:#1a1a2e;color:#e0e0e0;margin-bottom:8px;box-sizing:border-box}
.file-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:3px;transition:background .2s}
.file-row:hover{background:#2d2d44}
.file-row span{font:13px monospace;color:#d4d4d4;flex:1}
.file-row button{padding:3px 8px;border-radius:3px;font-size:11px;cursor:pointer;background:none;margin:0 2px}
.btn-edit{border:1px solid #569cd6;color:#569cd6}
.btn-del{border:1px solid #dc3545;color:#dc3545}
</style>
</head>
<body>

<div id="login-page" class="login-page">
  <div class="login-box">
    <h2>知识库编辑器</h2>
    <p>登录 GitHub 开始编辑</p>
    <button class="gh-btn" onclick="oauthLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0a12 12 0 00-3.79 23.39c.6.11.82-.26.82-.58v-2.23c-3.34.73-4.03-1.42-4.03-1.42-.55-1.39-1.33-1.76-1.33-1.76-1.09-.74.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .1-.78.41-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.11-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 016 0c2.3-1.55 3.3-1.23 3.3-1.23.65 1.65.24 2.87.12 3.18a4.7 4.7 0 011.23 3.22c0 4.6-2.8 5.62-5.48 5.92.43.37.82 1.1.82 2.22v3.3c0 .31.2.69.8.57A12 12 0 0012 0z"/></svg>
      GitHub 账号登录
    </button>
    <div class="diver">或使用 Token</div>
    <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx">
    <button class="tk-btn" onclick="tokenLogin()">Token 登录</button>
    <p class="hint"><a href="https://github.com/settings/tokens" target="_blank">获取 Token</a>，勾选 repo 权限</p>
  </div>
</div>

<div id="editor-page" style="display:none;height:100vh;flex-direction:column">
  <div class="bar">
    <a href="index.html" class="logo">Wiki</a>
    <span style="color:#555">/</span>
    <input type="text" id="path-input" placeholder="路径，如 wiki/AI/新文章.md">
    <span id="status"></span>
    <button class="btn-out" onclick="togglePreview()">预览</button>
    <button class="btn-save" onclick="save()">保存 Ctrl+S</button>
    <button class="btn-out" onclick="openModal()">打开</button>
    <button class="btn-out" onclick="logout()">退出</button>
  </div>
  <div class="main">
    <div class="editor-pane" id="edit-pane">
      <div class="editor-label">Markdown</div>
      <textarea id="md-editor"></textarea>
    </div>
    <div class="preview-pane" id="preview-pane"></div>
  </div>
</div>

<div class="modal-bg" id="file-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-h"><h3>文件列表</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body" id="modal-list">加载中...</div>
    <div class="modal-foot">
      <input type="text" id="modal-new" placeholder="新建路径，如 wiki/编程/Python.md">
      <button class="btn-save" style="width:100%;padding:9px" onclick="createNew()">创建并打开</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/markdown/markdown.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/mode/overlay.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/gfm/gfm.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/14.1.4/marked.min.js"></script>

<script>
var CLIENT_ID = 'Ov23ctCfpMxGeAINGXGW';
var REDIRECT = 'https://archercool.github.io/wiki-editor/callback.html';
var OWNER = 'Archercool', REPO = 'wiki-editor', BRANCH = 'main';
var cm = null;
var showingPreview = false;
var allFiles = [];

// === Token ===
function tok() { return localStorage.getItem('wiki_editor_token') || sessionStorage.getItem('wiki_editor_token'); }
function setTok(t) { localStorage.setItem('wiki_editor_token', t); }
function clearTok() { localStorage.removeItem('wiki_editor_token'); sessionStorage.removeItem('wiki_editor_token'); }
function oauthLogin() { location.href = 'https://github.com/login/oauth/authorize?client_id=' + CLIENT_ID + '&redirect_uri=' + encodeURIComponent(REDIRECT) + '&scope=repo'; }
function tokenLogin() { var t = document.getElementById('token-input').value.trim(); if (!t) { alert('请输入 Token'); return; } setTok(t); location.reload(); }
function logout() { clearTok(); location.reload(); }

// === API ===
function enc(s) { return s.split('/').map(function(x){return encodeURIComponent(x)}).join('/'); }
function dec(b) { return decodeURIComponent(escape(atob(b.replace(/\n/g,'')))); }
function enc2(s) { return btoa(unescape(encodeURIComponent(s))); }
function api(p, opt) {
  var h = { 'Authorization': 'token ' + tok(), 'Accept': 'application/vnd.github.v3+json' };
  if (opt && opt.body) h['Content-Type'] = 'application/json';
  return fetch('https://api.github.com/repos/' + OWNER + '/' + REPO + '/contents/' + p, { method: opt ? (opt.method || 'GET') : 'GET', headers: h, body: opt ? opt.body : undefined });
}

// === 编辑器 ===
function initCM() {
  cm = CodeMirror.fromTextArea(document.getElementById('md-editor'), {
    mode: 'gfm',
    lineNumbers: true,
    lineWrapping: true,
    theme: 'material-darker',
    viewportMargin: Infinity,
    extraKeys: {
      'Ctrl-S': function() { save(); },
      'Cmd-S': function() { save(); }
    }
  });
  cm.on('change', function() {
    document.getElementById('status').textContent = cm.getValue().length + ' 字';
  });
}

async function loadFile(p) {
  var st = document.getElementById('status');
  st.textContent = '加载中...';
  try {
    var r = await api(enc(p));
    if (r.ok) { cm.setValue(dec((await r.json()).content)); st.textContent = ''; }
    else { cm.setValue(''); st.textContent = '新文件'; }
  } catch(e) { st.textContent = '加载失败'; }
}

async function save() {
  var p = document.getElementById('path-input').value.trim();
  if (!p) { alert('请输入路径'); return; }
  if (!p.endsWith('.md')) p += '.md';
  document.getElementById('path-input').value = p;
  var md = cm.getValue();
  if (!md.trim()) { alert('内容不能为空'); return; }
  var st = document.getElementById('status');
  st.textContent = '保存中...';
  try {
    var sha = null;
    var r = await api(enc(p));
    if (r.ok) sha = (await r.json()).sha;
    var body = { message: 'Update ' + p, content: enc2(md), branch: BRANCH };
    if (sha) body.sha = sha;
    var r2 = await api(enc(p), { method: 'PUT', body: JSON.stringify(body) });
    if (r2.ok) { st.textContent = '已保存 ✓'; setTimeout(function(){ st.textContent = ''; }, 3000); }
    else { throw new Error((await r2.json()).message); }
  } catch(e) { st.textContent = '失败'; alert('保存失败: ' + (e.message || '检查网络')); }
}

function togglePreview() {
  var preview = document.getElementById('preview-pane');
  var edit = document.getElementById('edit-pane');
  if (!showingPreview) {
    preview.style.display = 'block';
    edit.style.flex = '1';
    preview.innerHTML = typeof marked !== 'undefined' ? marked.parse(cm.getValue()) : cm.getValue().replace(/\n/g,'<br>');
    showingPreview = true;
  } else {
    preview.style.display = 'none';
    edit.style.flex = '2';
    showingPreview = false;
  }
}

// === 文件弹窗 ===
async function openModal() {
  document.getElementById('file-modal').style.display = 'flex';
  document.getElementById('modal-list').innerHTML = '<p style="color:#888;text-align:center;padding:30px">加载中...</p>';
  try {
    var r = await fetch('https://api.github.com/repos/' + OWNER + '/' + REPO + '/git/trees/' + BRANCH + '?recursive=1', { headers: { 'Authorization': 'token ' + tok() } });
    allFiles = ((await r.json()).tree || []).filter(function(f){ return f.path.startsWith('wiki/') && f.path.endsWith('.md'); });
    renderList();
  } catch(e) { document.getElementById('modal-list').innerHTML = '<p style="color:#dc3545;text-align:center;padding:30px">加载失败</p>'; }
}

function renderList() {
  document.getElementById('modal-list').innerHTML = allFiles.length === 0
    ? '<p style="color:#888;text-align:center;padding:30px">暂无</p>'
    : allFiles.map(function(f){ return '<div class="file-row"><span>' + f.path + '</span><div><button class="btn-edit" onclick="openFile(\'' + f.path.replace(/'/g,"\\'") + '\')">编辑</button><button class="btn-del" onclick="delFile(\'' + f.path.replace(/'/g,"\\'") + '\')">删除</button></div></div>'; }).join('');
}

function openFile(p) { document.getElementById('path-input').value = p; loadFile(p); closeModal(); }
async function delFile(p) { if (!confirm('删除 ' + p + ' ？')) return; var r = await api(enc(p)); if (r.ok) { var sha = (await r.json()).sha; await api(enc(p), { method: 'DELETE', body: JSON.stringify({ message: 'Delete ' + p, sha: sha, branch: BRANCH }) }); allFiles = allFiles.filter(function(f){ return f.path !== p; }); renderList(); } }
function createNew() { var p = document.getElementById('modal-new').value.trim(); if (!p) { alert('请输入路径'); return; } if (!p.endsWith('.md')) p += '.md'; document.getElementById('path-input').value = p; cm.setValue(''); closeModal(); }
function closeModal() { document.getElementById('file-modal').style.display = 'none'; }

// === 初始化 ===
document.addEventListener('DOMContentLoaded', function() {
  var t = tok();
  if (!t) return;
  fetch('https://api.github.com/user', { headers: { 'Authorization': 'token ' + t } })
    .then(function(r) {
      if (!r.ok) { clearTok(); return; }
      document.getElementById('login-page').style.display = 'none';
      document.getElementById('editor-page').style.display = 'flex';
      initCM();
      var p = new URLSearchParams(location.search).get('path');
      if (p) { document.getElementById('path-input').value = p; loadFile(p); }
    });
});
</script>
</body>
</html>
