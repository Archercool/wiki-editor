<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识库编辑器</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;height:100vh;display:flex;flex-direction:column;background:#fff}
.bar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:#24292e;border-bottom:1px solid #333;flex-shrink:0}
.bar .logo{font-weight:700;font-size:14px;color:#fff;text-decoration:none;white-space:nowrap}
.bar input{flex:1;min-width:120px;padding:6px 8px;border:1px solid #444;border-radius:3px;font:13px monospace;background:#fff;color:#333}
.bar input:focus{outline:none;border-color:#0366d6}
.bar button{padding:6px 12px;border:none;border-radius:3px;cursor:pointer;font-size:12px;white-space:nowrap}
.btn-save{background:#28a745;color:#fff}
.btn-save:hover{background:#2c974b}
.btn-out{background:#fafbfc;color:#24292e;border:1px solid #d1d5da!important}
.btn-out:hover{background:#e9ecef}
#status{font-size:11px;color:#999;min-width:50px}
.main{flex:1;display:flex;overflow:hidden}
.editor-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.EditorContainer,.EasyMDEContainer,.CodeMirror{flex:1;height:auto!important}
.login-page{display:flex;align-items:center;justify-content:center;height:100vh;background:#f6f8fa}
.login-box{background:#fff;padding:36px;border-radius:6px;box-shadow:0 1px 3px rgba(0,0,0,.12);width:380px;max-width:90%;text-align:center}
.login-box h2{margin-bottom:6px;color:#24292e}
.login-box p{color:#586069;margin-bottom:18px;font-size:14px}
.gh-btn{display:inline-flex;align-items:center;gap:8px;width:100%;padding:11px;background:#24292e;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer;justify-content:center}
.gh-btn:hover{background:#2f363d}
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center}
.modal-box{background:#fff;border-radius:6px;width:560px;max-width:90%;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 4px 24px rgba(0,0,0,.2)}
.modal-h{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid #e1e4e8}
.modal-h h3{font-size:15px;color:#24292e}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#6a737d}
.modal-body{flex:1;overflow-y:auto;padding:10px}
.modal-foot{padding:10px 18px;border-top:1px solid #e1e4e8}
.modal-foot input{width:100%;padding:8px;border:1px solid #d1d5da;border-radius:3px;font-size:13px;background:#fff;color:#333;margin-bottom:8px;box-sizing:border-box}
.file-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:3px;transition:background .2s}
.file-row:hover{background:#f6f8fa}
.file-row span{font:13px monospace;color:#24292e;flex:1}
.file-row button{padding:3px 8px;border-radius:3px;font-size:11px;cursor:pointer;background:none;margin:0 2px}
.btn-edit{border:1px solid #0366d6;color:#0366d6}
.btn-del{border:1px solid #d73a49;color:#d73a49}
/* EasyMDE 暗色工具栏适配 */
.editor-toolbar{background:#f6f8fa;border-color:#e1e4e8}
.editor-toolbar button{color:#586069!important}
.editor-toolbar button:hover{background:#e9ecef!important}
.editor-toolbar button.active{background:#0366d6!important;color:#fff!important}
.CodeMirror{border-color:#e1e4e8!important}
/* 预览面板暗色 */
 EasyMDE预览用 GitHub 样式 */
.markdown-body{padding:20px;max-width:800px}
</style>
</head>
<body>

<div id="login-page" class="login-page">
  <div class="login-box">
    <h2>知识库编辑器</h2>
    <p>使用 GitHub 账号登录</p>
    <button class="gh-btn" onclick="oauthLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0a12 12 0 00-3.79 23.39c.6.11.82-.26.82-.58v-2.23c-3.34.73-4.03-1.42-4.03-1.42-.55-1.39-1.33-1.76-1.33-1.76-1.09-.74.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .1-.78.41-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.11-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 016 0c2.3-1.55 3.3-1.23 3.3-1.23.65 1.65.24 2.87.12 3.18a4.7 4.7 0 011.23 3.22c0 4.6-2.8 5.62-5.48 5.92.43.37.82 1.1.82 2.22v3.3c0 .31.2.69.8.57A12 12 0 0012 0z"/></svg>
      GitHub 登录
    </button>
  </div>
</div>

<div id="editor-page" style="display:none;height:100vh;flex-direction:column">
  <div class="bar">
    <a href="index.html" class="logo">Wiki</a>
    <span style="color:#999">/</span>
    <select id="folder-select" style="padding:5px 8px;border:1px solid #d1d5da;border-radius:3px;font:13px monospace;background:#fff;color:#333;max-width:160px">
      <option value="">选择文件夹</option>
    </select>
    <span style="color:#999">/</span>
    <input type="text" id="filename-input" placeholder="文件名.md" style="width:160px">
    <span id="status"></span>
    <button class="btn-out" onclick="togglePreview()">预览</button>
    <button class="btn-save" onclick="save()">保存 Ctrl+S</button>
    <button class="btn-out" onclick="openModal()">打开</button>
    <button class="btn-out" onclick="logout()">退出</button>
  </div>
  <div class="main">
    <div class="editor-wrap">
      <textarea id="md-editor"></textarea>
    </div>
  </div>
</div>

<div class="modal-bg" id="file-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-h"><h3>文件列表</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body" id="modal-list">加载中...</div>
    <div class="modal-foot">
      <input type="text" id="modal-new" placeholder="新建路径，如 wiki/编程/Python.md">
      <button class="btn-save" style="width:100%;padding:9px" onclick="createNew()">创建并打开</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
<script>
var CLIENT_ID = 'Ov23ctCfpMxGeAINGXGW';
var REDIRECT = 'https://archercool.github.io/wiki-editor/callback.html';
var OWNER = 'Archercool', REPO = 'wiki-editor', BRANCH = 'main';
var easyMDE = null;
var allFiles = [];
var folders = [];

function tok() { return localStorage.getItem('wiki_editor_token'); }
function setTok(t) { localStorage.setItem('wiki_editor_token', t); }
function clearTok() { localStorage.removeItem('wiki_editor_token'); }
function oauthLogin() { location.href = 'https://github.com/login/oauth/authorize?client_id=' + CLIENT_ID + '&redirect_uri=' + encodeURIComponent(REDIRECT) + '&scope=repo'; }
function logout() { clearTok(); location.reload(); }

function enc(s) { return s.split('/').map(function(x){return encodeURIComponent(x)}).join('/'); }
function dec(b) { return decodeURIComponent(escape(atob(b.replace(/\n/g,'')))); }
function enc2(s) { return btoa(unescape(encodeURIComponent(s))); }
function api(p, opt) {
  var h = { 'Authorization': 'token ' + tok(), 'Accept': 'application/vnd.github.v3+json' };
  if (opt && opt.body) h['Content-Type'] = 'application/json';
  return fetch('https://api.github.com/repos/' + OWNER + '/' + REPO + '/contents/' + p, { method: opt ? (opt.method || 'GET') : 'GET', headers: h, body: opt ? opt.body : undefined });
}

function getFullPath() {
  var folder = document.getElementById('folder-select').value;
  var file = document.getElementById('filename-input').value.trim();
  if (!file) return '';
  if (!file.endsWith('.md')) file += '.md';
  return folder ? folder + '/' + file : file;
}

function setPath(fullPath) {
  if (!fullPath) return;
  fullPath = decodeURIComponent(fullPath);
  var parts = fullPath.replace('wiki/', '').split('/');
  if (parts.length >= 2) {
    var folder = 'wiki/' + parts[0];
    var file = parts.slice(1).join('/');
    document.getElementById('folder-select').value = folder;
    document.getElementById('filename-input').value = file;
  } else {
    document.getElementById('folder-select').value = '';
    document.getElementById('filename-input').value = fullPath;
  }
}

async function loadFolders() {
  try {
    var r = await fetch('https://api.github.com/repos/' + OWNER + '/' + REPO + '/git/trees/' + BRANCH + '?recursive=1', { headers: { 'Authorization': 'token ' + tok() } });
    var data = await r.json();
    var seen = {};
    (data.tree || []).forEach(function(f) {
      if (!f.path.startsWith('wiki/')) return;
      var parts = f.path.replace('wiki/', '').split('/');
      if (parts.length >= 2) {
        var folderPath = 'wiki/' + parts[0];
        if (!seen[folderPath]) {
          seen[folderPath] = true;
          folders.push({ name: parts[0], path: folderPath });
        }
      }
    });
    folders.sort(function(a, b) { return a.name.localeCompare(b.name); });
    var sel = document.getElementById('folder-select');
    folders.forEach(function(f) {
      var opt = document.createElement('option');
      opt.value = f.path;
      opt.textContent = f.name;
      sel.appendChild(opt);
    });
  } catch(e) {}
}

function initEditor() {
  easyMDE = new EasyMDE({
    element: document.getElementById('md-editor'),
    spellChecker: false,
    status: false,
    toolbar: [
      'bold', 'italic', 'heading', '|',
      'code', 'quote', 'unordered-list', 'ordered-list', '|',
      'link', 'image', 'table', 'horizontal-rule', '|',
      'preview', 'side-by-side', 'fullscreen', '|',
      'guide'
    ],
    renderingConfig: { codeSyntaxHighlighting: false }
  });
  easyMDE.codemirror.on('change', function() {
    document.getElementById('status').textContent = easyMDE.value().length + ' 字';
  });
  easyMDE.codemirror.setOption('extraKeys', {
    'Ctrl-S': function() { save(); },
    'Cmd-S': function() { save(); }
  });
}

async function loadFile(p) {
  var st = document.getElementById('status');
  st.textContent = '加载中...';
  p = decodeURIComponent(p);
  setPath(p);
  try {
    var r = await api(enc(p));
    if (r.ok) { easyMDE.value(dec((await r.json()).content)); st.textContent = ''; }
    else { easyMDE.value(''); st.textContent = '新文件'; }
  } catch(e) { st.textContent = '加载失败'; }
}

async function save() {
  var p = getFullPath();
  if (!p) { alert('请选择文件夹并输入文件名'); return; }
  var md = easyMDE.value();
  if (!md.trim()) { alert('内容不能为空'); return; }
  var st = document.getElementById('status');
  st.textContent = '保存中...';
  try {
    var sha = null;
    var r = await api(enc(p));
    if (r.ok) sha = (await r.json()).sha;
    var body = { message: 'Update ' + p, content: enc2(md), branch: BRANCH };
    if (sha) body.sha = sha;
    var r2 = await api(enc(p), { method: 'PUT', body: JSON.stringify(body) });
    if (r2.ok) { st.textContent = '已保存 ✓'; setTimeout(function(){ st.textContent = ''; }, 3000); }
    else { throw new Error((await r2.json()).message); }
  } catch(e) { st.textContent = '失败'; alert('保存失败: ' + (e.message || '检查网络')); }
}

function togglePreview() { easyMDE.togglePreview(); }

async function openModal() {
  document.getElementById('file-modal').style.display = 'flex';
  document.getElementById('modal-list').innerHTML = '<p style="color:#888;text-align:center;padding:30px">加载中...</p>';
  try {
    var r = await fetch('https://api.github.com/repos/' + OWNER + '/' + REPO + '/git/trees/' + BRANCH + '?recursive=1', { headers: { 'Authorization': 'token ' + tok() } });
    allFiles = ((await r.json()).tree || []).filter(function(f){ return f.path.startsWith('wiki/') && f.path.endsWith('.md'); });
    renderList();
  } catch(e) { document.getElementById('modal-list').innerHTML = '<p style="color:#d73a49;text-align:center;padding:30px">加载失败</p>'; }
}

function renderList() {
  document.getElementById('modal-list').innerHTML = allFiles.length === 0
    ? '<p style="color:#888;text-align:center;padding:30px">暂无</p>'
    : allFiles.map(function(f){ return '<div class="file-row"><span>' + f.path + '</span><div><button class="btn-edit" onclick="openFile(\'' + f.path.replace(/'/g,"\\'") + '\')">编辑</button><button class="btn-del" onclick="delFile(\'' + f.path.replace(/'/g,"\\'") + '\')">删除</button></div></div>'; }).join('');
}

function openFile(p) { loadFile(p); closeModal(); }
async function delFile(p) { if (!confirm('删除 ' + p + ' ？')) return; var r = await api(enc(p)); if (r.ok) { var sha = (await r.json()).sha; await api(enc(p), { method: 'DELETE', body: JSON.stringify({ message: 'Delete ' + p, sha: sha, branch: BRANCH }) }); allFiles = allFiles.filter(function(f){ return f.path !== p; }); renderList(); } }
function createNew() {
  var p = document.getElementById('modal-new').value.trim();
  if (!p) { alert('请输入路径'); return; }
  if (!p.endsWith('.md')) p += '.md';
  loadFile(p);
  closeModal();
}
function closeModal() { document.getElementById('file-modal').style.display = 'none'; }

document.addEventListener('DOMContentLoaded', function() {
  var t = tok();
  if (!t) return;
  fetch('https://api.github.com/user', { headers: { 'Authorization': 'token ' + t } })
    .then(function(r) {
      if (!r.ok) { clearTok(); return; }
      document.getElementById('login-page').style.display = 'none';
      document.getElementById('editor-page').style.display = 'flex';
      initEditor();
      var p = new URLSearchParams(location.search).get('path');
      if (p) loadFile(p);
      loadFolders();
    });
});
</script>
</body>
</html>
