<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知识库编辑器</title>
  
  <!-- Vditor CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vditor/dist/index.css">
  
  <!-- 自定义样式 -->
  <link rel="stylesheet" href="css/edit.css">
</head>
<body>
  <div id="app">
    <div class="loading-container">
      <div class="loading-spinner"></div>
      <p>加载中...</p>
    </div>
  </div>

  <div id="editor-container" style="display: none;">
    <!-- 顶部工具栏 -->
    <header class="editor-header">
      <div class="header-left">
        <a href="index.html" class="logo">知识库</a>
        <span class="separator">/</span>
        <input type="text" id="path-input" class="path-input" 
               placeholder="文件路径，例如: wiki/AI/机器学习.md">
      </div>
      <div class="header-right">
        <span id="save-status" class="save-status"></span>
        <button id="preview-btn" class="tool-btn" title="切换预览 (Ctrl+E)">
          预览
        </button>
        <button id="save-btn" class="primary-btn" title="保存 (Ctrl+S)">
          保存
        </button>
        <button id="logout-btn" class="tool-btn" title="退出登录">
          退出
        </button>
      </div>
    </header>

    <!-- 编辑器主体 -->
    <main class="editor-main">
      <div id="vditor"></div>
    </main>

    <!-- 底部状态栏 -->
    <footer class="editor-footer">
      <div class="footer-left">
        <span id="word-count">0 字</span>
      </div>
      <div class="footer-right">
        <span class="shortcut-hint">Ctrl+S 保存 | Ctrl+Z 撤销 | Ctrl+Shift+Z 重做</span>
      </div>
    </footer>
  </div>

  <!-- Vditor JS -->
  <script src="https://cdn.jsdelivr.net/npm/vditor/dist/js/min/vditor.min.js"></script>
  
  <!-- 自定义模块 -->
  <script src="js/auth.js"></script>
  <script src="js/github-api.js"></script>
  <script src="js/uploader.js"></script>
  <script src="js/editor.js"></script>
  
  <script>
    // 页面加载完成后显示编辑器
    document.addEventListener('DOMContentLoaded', () => {
      // 检查是否已认证
      if (Auth.isAuthenticated()) {
        document.getElementById('app').style.display = 'none';
        document.getElementById('editor-container').style.display = 'flex';
      }
    });
  </script>
</body>
</html>
