<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录中...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { background: #fff; border-radius: 8px; padding: 40px; max-width: 400px; width: 90%; text-align: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid #f3f3f3; border-top: 3px solid #0366d6; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    h1 { font-size: 20px; color: #333; margin-bottom: 12px; }
    p { color: #666; }
    .error { color: #c53030; }
    .btn { display: inline-block; margin-top: 16px; padding: 10px 20px; background: #0366d6; color: #fff; border: none; border-radius: 4px; text-decoration: none; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1 id="title">登录中...</h1>
    <p id="message">正在验证 GitHub 账号</p>
  </div>

  <script>
    (async function() {
      var title = document.getElementById('title');
      var msg = document.getElementById('message');
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');
      var error = params.get('error');

      if (error) {
        title.textContent = '登录失败';
        msg.textContent = '您拒绝了授权';
        msg.className = 'error';
        msg.innerHTML += '<br><a href="edit.html" class="btn">返回重试</a>';
        return;
      }

      if (!code) {
        title.textContent = '登录失败';
        msg.textContent = '未收到授权码';
        msg.className = 'error';
        msg.innerHTML += '<br><a href="edit.html" class="btn">返回重试</a>';
        return;
      }

      try {
        var resp = await fetch('https://github-oauth-proxy.aoranli1126.workers.dev/api/token?code=' + code);
        var data = await resp.json();

        if (data.access_token) {
          localStorage.setItem('wiki_editor_token', data.access_token);
          title.textContent = '登录成功';
          msg.textContent = '正在跳转...';
          setTimeout(function() { window.location.href = 'edit.html'; }, 800);
        } else {
          throw new Error(data.error_description || '授权失败');
        }
      } catch(e) {
        title.textContent = '登录失败';
        msg.textContent = e.message || '请重试';
        msg.className = 'error';
        msg.innerHTML += '<br><a href="edit.html" class="btn">返回重试</a>';
      }
    })();
  </script>
</body>
</html>
