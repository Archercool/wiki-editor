<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录中... - 知识库</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      background: white;
      border-radius: 8px;
      padding: 40px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #0366d6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h1 { font-size: 20px; color: #333; margin-bottom: 12px; }
    p { color: #666; margin-bottom: 8px; }
    .error { color: #c53030; }
    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 20px;
      background: #0366d6;
      color: white;
      border: none;
      border-radius: 4px;
      text-decoration: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1 id="title">登录中...</h1>
    <p id="message">正在验证您的 GitHub 账号</p>
  </div>

  <script src="js/auth.js"></script>
  <script>
    (async function() {
      const titleEl = document.getElementById('title');
      const messageEl = document.getElementById('message');
      
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const error = params.get('error');

      if (error) {
        titleEl.textContent = '登录失败';
        messageEl.textContent = '您拒绝了授权或授权已过期';
        messageEl.className = 'error';
        messageEl.innerHTML += '<br><a href="edit.html" class="btn">返回重试</a>';
        return;
      }

      if (!code) {
        titleEl.textContent = '登录失败';
        messageEl.textContent = '未收到授权码';
        messageEl.className = 'error';
        messageEl.innerHTML += '<br><a href="edit.html" class="btn">返回重试</a>';
        return;
      }

      try {
        const result = await Auth.exchangeCode(code);
        
        if (result.success) {
          const userResult = await Auth.validateToken(result.token);
          
          if (userResult.valid) {
            titleEl.textContent = '登录成功';
            messageEl.textContent = `欢迎，${userResult.user.login}！`;
            
            setTimeout(() => {
              window.location.href = 'edit.html';
            }, 1000);
          } else {
            throw new Error('验证 Token 失败');
          }
        } else {
          throw new Error(result.error);
        }
      } catch (err) {
        titleEl.textContent = '登录失败';
        messageEl.textContent = err.message || '请重试';
        messageEl.className = 'error';
        messageEl.innerHTML += '<br><a href="edit.html" class="btn">返回重试</a>';
      }
    })();
  </script>
</body>
</html>
