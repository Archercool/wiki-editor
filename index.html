<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>知识库</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    .fab-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 998;
    }
    .fab-btn {
      width: 56px; height: 56px;
      border-radius: 50%; border: none;
      font-size: 24px; cursor: pointer;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
      display: flex; align-items: center; justify-content: center;
    }
    .fab-btn:hover { transform: scale(1.1); }
    .fab-btn svg { width: 24px; height: 24px; fill: currentColor; }
    .edit-fab { background: #0366d6; color: #fff; }
    .new-fab { background: #28a745; color: #fff; }
  </style>
</head>
<body>
  <div id="app">加载中...</div>

  <div class="fab-container">
    <button class="fab-btn new-fab" onclick="location.href='edit.html'">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    </button>
    <button class="fab-btn edit-fab" onclick="editCurrent()">
      <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
    </button>
  </div>

  <script>
    function editCurrent() {
      var path = window.location.hash.replace('#/', '').replace('.md', '');
      if (!path || path === '/') { alert('请先打开一篇文章'); return; }
      location.href = 'edit.html?path=' + encodeURIComponent(path + '.md');
    }

    window.$docsify = {
      name: '知识库',
      repo: 'https://github.com/Archercool/wiki-editor',
      loadSidebar: true,
      subMaxLevel: 2,
      search: { placeholder: '搜索知识库', noData: '没有找到结果', depth: 3 },
      auto2top: true,
      homepage: 'HOME.md',
      plugins: [function(hook) {
        var done = false;
        hook.doneEach(function() {
          var sidebar = document.querySelector('.sidebar');
          if (!sidebar) return;

          // 动态加载文章列表
          if (!done) {
            done = true;
            var nav = document.querySelector('.sidebar-nav');
            fetch('https://api.github.com/repos/Archercool/wiki-editor/git/trees/main?recursive=1')
              .then(function(r) { return r.json(); })
              .then(function(data) {
                var files = (data.tree || []).filter(function(f) { return f.path.startsWith('wiki/') && f.path.endsWith('.md'); });
                var groups = {};
                files.forEach(function(f) {
                  var p = f.path.replace('wiki/', '').split('/');
                  if (p.length >= 2) {
                    if (!groups[p[0]]) groups[p[0]] = [];
                    groups[p[0]].push({ name: decodeURIComponent(p[p.length-1].replace('.md','')), path: f.path });
                  }
                });
                var html = '- [首页](/)\n';
                Object.keys(groups).sort().forEach(function(c) {
                  html += '- **' + c + '**\n';
                  groups[c].forEach(function(a) { html += '  - [' + a.name + '](' + a.path + ')\n'; });
                });
                nav.innerHTML = window.Docsify.util.parser(html);
              });
          }

          // 侧边栏底部编辑入口
          if (document.getElementById('sb-edit')) return;
          sidebar.style.position = 'relative';
          var el = document.createElement('a');
          el.id = 'sb-edit';
          el.href = 'edit.html';
          el.textContent = '编辑';
          el.style.cssText = 'position:absolute;bottom:12px;right:16px;z-index:999;background:#24292e;color:#fff;padding:6px 14px;border-radius:4px;text-decoration:none;font-size:13px;';
          sidebar.appendChild(el);
        });
      }]
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
