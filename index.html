<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>知识库</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    .fab-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 998;
    }
    .fab-btn {
      width: 56px; height: 56px;
      border-radius: 50%; border: none;
      font-size: 24px; cursor: pointer;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
      display: flex; align-items: center; justify-content: center;
    }
    .fab-btn:hover { transform: scale(1.1); }
    .fab-btn svg { width: 24px; height: 24px; fill: currentColor; }
    .edit-fab { background: #0366d6; color: #fff; }
    .new-fab { background: #28a745; color: #fff; }
    .login-fab { background: #24292e; color: #fff; }
    .folder-fab { background: #6f42c1; color: #fff; }
    .modal-mask{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center}
    .modal-panel{background:#fff;border-radius:8px;padding:24px;width:360px;max-width:90%;box-shadow:0 4px 24px rgba(0,0,0,.2)}
    .modal-panel h3{margin:0 0 12px;font-size:16px;color:#24292e}
    .modal-panel input{width:100%;padding:8px 12px;border:1px solid #d1d5da;border-radius:4px;font-size:14px;box-sizing:border-box}
    .modal-panel .btns{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
    .modal-panel .btns button{padding:6px 16px;border-radius:4px;font-size:13px;cursor:pointer;border:1px solid #d1d5da;background:#fff}
    .modal-panel .btns .btn-ok{background:#28a745;color:#fff;border-color:#28a745}
  </style>
</head>
<body>
  <div id="app">加载中...</div>

  <div class="fab-container">
    <button class="fab-btn folder-fab" onclick="showFolderModal()" title="新建文件夹">
      <svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
    </button>
    <button class="fab-btn new-fab" onclick="location.href='edit.html'">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    </button>
    <button class="fab-btn edit-fab" onclick="editCurrent()">
      <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
    </button>
    <button class="fab-btn login-fab" onclick="location.href='edit.html'">
      <svg viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
    </button>
  </div>

  <div class="modal-mask" id="folder-modal" onclick="if(event.target===this)this.style.display='none'">
    <div class="modal-panel">
      <h3>新建文件夹</h3>
      <input type="text" id="folder-name" placeholder="文件夹名称，如 编程">
      <div class="btns">
        <button onclick="document.getElementById('folder-modal').style.display='none'">取消</button>
        <button class="btn-ok" onclick="createFolder()">创建</button>
      </div>
    </div>
  </div>

  <script>
    var OWNER = 'Archercool', REPO = 'wiki-editor', BRANCH = 'main';

    function tok() { return localStorage.getItem('wiki_editor_token'); }

    function editCurrent() {
      var hash = window.location.hash.replace('#/', '');
      if (!hash || hash === '/' || hash === 'index.html') { alert('请先打开一篇文章'); return; }
      var path;
      try { path = decodeURIComponent(hash); } catch(e) { path = hash; }
      if (!path.endsWith('.md')) path += '.md';
      location.href = 'edit.html?path=' + encodeURIComponent(path);
    }

    function showFolderModal() {
      if (!tok()) { alert('请先在编辑器页面登录 GitHub'); location.href = 'edit.html'; return; }
      document.getElementById('folder-modal').style.display = 'flex';
      document.getElementById('folder-name').value = '';
      document.getElementById('folder-name').focus();
    }

    async function createFolder() {
      var name = document.getElementById('folder-name').value.trim();
      if (!name) { alert('请输入文件夹名称'); return; }
      if (!/^[a-zA-Z0-9\u4e00-\u9fa5_-]+$/.test(name)) { alert('名称只能包含中文、字母、数字、下划线、短横线'); return; }
      var path = 'wiki/' + name + '/.gitkeep';
      var enc = function(s) { return s.split('/').map(function(x){return encodeURIComponent(x)}).join('/'); };
      var enc2 = function(s) { return btoa(unescape(encodeURIComponent(s))); };
      try {
        var r = await fetch('https://api.github.com/repos/' + OWNER + '/' + REPO + '/contents/' + enc(path), {
          method: 'PUT',
          headers: { 'Authorization': 'token ' + tok(), 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
          body: JSON.stringify({ message: 'Create folder ' + name, content: enc2(''), branch: BRANCH })
        });
        if (r.ok) {
          document.getElementById('folder-modal').style.display = 'none';
          location.reload();
        } else {
          var err = await r.json();
          alert('创建失败: ' + (err.message || '未知错误'));
        }
      } catch(e) { alert('创建失败: ' + e.message); }
    }

    document.getElementById('folder-name').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') createFolder();
    });

    window.$docsify = {
      name: '知识库',
      repo: 'https://github.com/Archercool/wiki-editor',
      loadSidebar: true,
      subMaxLevel: 2,
      search: { placeholder: '搜索知识库', noData: '没有找到结果', depth: 3 },
      auto2top: true,
      homepage: 'HOME.md',
      plugins: [function(hook) {
        var done = false;
        hook.doneEach(function() {
          if (done) return;
          var nav = document.querySelector('.sidebar-nav');
          if (!nav) return;
          done = true;
          fetch('https://api.github.com/repos/Archercool/wiki-editor/git/trees/main?recursive=1')
            .then(function(r) { return r.json(); })
            .then(function(data) {
              var tree = (data.tree || []).filter(function(f) {
                return f.path.startsWith('wiki/');
              });
              var folders = {};
              tree.forEach(function(f) {
                var parts = f.path.replace('wiki/', '').split('/');
                if (parts.length < 2) return;
                var cat = parts[0];
                if (!folders[cat]) folders[cat] = [];
                if (f.path.endsWith('.md') && parts.length >= 2) {
                  var name = decodeURIComponent(parts[parts.length - 1].replace('.md', ''));
                  folders[cat].push({ name: name, path: f.path });
                }
              });
              var html = '<ul class="sidebar-nav"><li><a href="#/">首页</a></li>';
              Object.keys(folders).sort().forEach(function(cat) {
                html += '<li><p class="sidebar-title">' + cat + '</p><ul>';
                if (folders[cat].length === 0) {
                  html += '<li><span style="color:#999;font-size:12px">（空）</span></li>';
                } else {
                  folders[cat].forEach(function(a) {
                    var link = '#/' + a.path.replace('.md', '');
                    html += '<li><a href="' + link + '">' + a.name + '</a></li>';
                  });
                }
                html += '</ul></li>';
              });
              html += '</ul>';
              nav.outerHTML = html;
            })
            .catch(function() {});
        });
      }]
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
